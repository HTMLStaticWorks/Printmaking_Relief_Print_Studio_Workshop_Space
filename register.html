<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Printmaking & Relief Print Studio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1616428784156-f5b248a39d22?auto=format&fit=crop&q=80&w=1920') center/cover;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1;
        }
        .auth-card {
            background: var(--clr-card-bg);
            padding: 3rem;
            border-radius: 8px;
            box-shadow: var(--shadow-hover);
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
            border: 1px solid var(--clr-border);
            margin: 2rem 0;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header svg {
            width: 48px;
            height: 48px;
            fill: var(--clr-sienna);
            margin-bottom: 1rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--clr-text-muted);
        }
        .auth-footer a {
            color: var(--clr-sienna);
            font-weight: 500;
        }
        .password-strength {
            height: 5px;
            width: 0%;
            background: transparent;
            margin-top: 10px;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .shake {
            animation: shake 0.5s ease-in-out;
        }
    </style>
</head>
<body>

    <!-- Right Top Corner Toggles -->
    <div class="fixed-toggles">
        <button id="theme-toggle" class="toggle-btn" aria-label="Toggle Dark Mode">☾</button>
        <button id="rtl-toggle" class="toggle-btn" aria-label="Toggle RTL">⇄</button>
    </div>

    <div class="auth-card reveal">
        <div class="auth-header">
            <a href="index.html">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </a>
            <h2>Create Account</h2>
            <p class="text-muted">Join our printmaking community.</p>
        </div>

        <form class="validate-form" novalidate>
            <div class="d-flex gap-3" style="flex-wrap: wrap;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <input type="text" id="fname" class="form-control" placeholder=" " required>
                    <label for="fname" class="floating-label">First Name</label>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <input type="text" id="lname" class="form-control" placeholder=" " required>
                    <label for="lname" class="floating-label">Last Name</label>
                </div>
            </div>
            
            <div class="form-group">
                <input type="email" id="email" class="form-control" placeholder=" " required>
                <label for="email" class="floating-label">Email Address</label>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <input type="password" id="password" class="form-control" placeholder=" " required>
                <label for="password" class="floating-label">Password</label>
                <div id="strength-meter" class="password-strength"></div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
